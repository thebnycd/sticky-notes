name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # кнопка ручного запуска на GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "StickyNotes" --icon=NONE main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: StickyNotes-Windows
          path: dist/StickyNotes.exe
          retention-days: 30
